<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sam Cooke Vr Exhibition</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>
</head>
<body>
    

<a-scene>


<a-plane 
        src="#plank_diff" 
        normal-map="#plank_nor" 
        roughness-map="#plank_rough"
        ambient-occlusion-map="#plank_ao" 
        rotation="-90 0 0" 
        width="20" 
        height="20" 
        position="0 0 1.5"
        repeat="10 10"
        material="roughness: 1; metalness: 0">
     
      </a-plane>

<a-sky color="#D3D3D3"></a-sky>
    <a-assets > 
        
       <img id="plank_diff" src="../assets/textures/plank/plank_flooring_04_diff_1k.png" alt="">
       

    <img id="Wall1" src="../assets/images/Wall1_SamC.png">
    <img id="Wall2" src="../assets/images/Wall2_SamC.png">
    <img id="Wall3" src="../assets/images/Wall3_SamC.png">
    <img id="Wall4" src="../assets/images/Wall4_SamC.png">
    <img id="Wall5" src="../assets/images/Wall5_Samc.png">
        
        <a-mixin id="wall" geometry="primative: box; width: 5.7; height:3;"></a-mixin>
    <a-mixin id="primary" material="color:#fffaed"></a-mixin>
    
    </a-assets>

    <a-entity id="main-hall">
        <a-entity mixin="wall primary " position="-7.45765 1.5 7.251" rotation="0.33 90 0"></a-entity>
        <a-entity mixin="wall primary" position="7.458 1.5 7.251" rotation="0.33 90 0"></a-entity>
        
        <a-entity mixin="wall primary" position="-5.203 1.5 2.14493" rotation="0 45 0"></a-entity>
        <a-entity mixin="wall primary" position="5.2 1.5 2.14493" rotation="0 -45 0"></a-entity>
        <a-entity mixin="wall primary" position="0 1.5 0" shadow></a-entity>


<a-plane width="5.7" height="3" rotation="0 -90 0" material="src: #Wall5" position="6.92271 1.52287 7.23815"></a-plane>

<a-plane width="5.7" height="3" rotation="0 44.92 0" material="src: #Wall2" position="-4.81922 1.49175 2.55233"></a-plane>

<a-plane width="5.7" height="3" rotation="0 90 0" material="src: #Wall1" position="-6.92443 1.47775 7.26929"></a-plane>

<a-plane width="5.7" height="3" material="src: #Wall3" position="0.04685 1.482 0.55642"></a-plane>

<a-plane width="5.7" height="3" material="src: #Wall4" position="4.83355 1.47128 2.54196" rotation="0 -45.3 0"></a-plane>





<a-entity position="-2.59663 0.11389 7.04996" rotation="0 90 0">
  <a-box position="0 0.45 0" width="2" height="0.1" depth="0.6" color="#c7a82e"></a-box>
  <a-box position="-0.8 0.22 0" width="0.05" height="0.45" depth="0.5" color="#222"></a-box>
  <a-box position="0.8 0.22 0" width="0.05" height="0.45" depth="0.5" color="#222"></a-box>
</a-entity>
    
    
<a-entity position="2.18943 0.11389 7.05797" rotation="0 90 0">
  <a-box position="0 0.45 0" width="2" height="0.1" depth="0.6" color="#c7a82e"></a-box>
  <a-box position="-0.8 0.22 0" width="0.05" height="0.45" depth="0.5" color="#222"></a-box>
  <a-box position="0.8 0.22 0" width="0.05" height="0.45" depth="0.5" color="#222"></a-box>
</a-entity>


</a-entity>

</a-scene>








</body>
</html>
